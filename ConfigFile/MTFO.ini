; MTFO
; Author: Guess1m
; Config Version: 4.0.0

[Debug]
; Toggles the display of 3D debugging lines, arrows, boundaries, and on-screen status subtitles.
ShowDebugLines=False
; Toggles the display of pathfinding nodes and road logic visuals for debugging purposes.
ShowDebugNodes=False

[Features]
; Toggles the system that forces traffic lights to turn green when approached with active sirens.
EnableOpticom=True
; Toggles the logic that forces cross-traffic to brake and yield at upcoming intersections or stop signs.
EnableIntersectionControl=True
; Toggles the logic that commands AI vehicles to dynamically overtake or navigate around a stationary or slow-moving player.
EnableAroundPlayerLogic=True
; If true, the around-player overtaking logic will only trigger when the player ped is actively seated inside a vehicle.
AroundPlayerLogicOnlyInVehicle=False
; Toggles the logic that forces oncoming traffic to pull over or brake when approached by an emergency vehicle.
EnableOncomingBraking=True

[AroundPlayer]
; The maximum distance (in meters) behind the player to scan for vehicles that need to navigate around them.
AroundPlayerDetectionRange=30
; The maximum lateral width (in meters) to detect blocked vehicles behind the player.
AroundPlayerDetectionWidth=8
; The forward distance (in meters) from the player where the AI will attempt to plot its overtake target position.
AroundPlayerOvertakeDistance=20
; The maximum time (in milliseconds) an AI vehicle will attempt the around-player maneuver before the task expires.
AroundPlayerTaskTimeoutMs=4000
; The distance (in meters) from the target node at which the around-player task is considered successfully completed.
AroundPlayerTaskCompletionDistance=3

[Opticom]
; The duration (in milliseconds) the traffic light will remain forced green after being triggered.
OpticomGreenDurationMs=6000
; The number of times the traffic light will cycle through the warning flash sequence before turning green.
OpticomFlashYellowCount=1
; The delay (in milliseconds) between the yellow and red states during the pre-green warning flash sequence.
OpticomFlashYellowInterval=300
; If true, the traffic light will perform a yellow-to-red warning flash sequence to alert cross-traffic before turning green.
OpticomFlashYellowFirst=False

[OncomingBrake]
; The minimum heading dot product required to classify a vehicle as traveling in the oncoming direction.
OncomingBrakeHeadingDot=-0.7
; The minimum lateral offset (in meters) from the player required to trigger oncoming braking.
OncomingBrakeMinLateral=-19
; The maximum lateral offset (in meters) from the player required to trigger oncoming braking.
OncomingBrakeMaxLateral=-1.5
; The duration (in milliseconds) that an oncoming vehicle will hold its brakes before resuming normal driving.
OncomingBrakeDurationMs=1500

[Intersection]
; The cooldown time (in milliseconds) after passing an intersection before the system begins scanning for the next one.
IntersectionDetectionCooldownMs=900
; The standard forward search radius (in meters) used to find oncoming traffic and yield candidates.
DetectionRange=45
; The minimum distance (in meters) ahead of the player to start scanning for intersection objects like lights and stop signs.
IntersectionSearchMinDistance=30
; The maximum distance (in meters) ahead of the player to stop scanning for intersection objects.
IntersectionSearchMaxDistance=45
; The increment (in meters) used when stepping from the maximum to minimum distance during the intersection object raycast.
IntersectionSearchStepSize=7
; The spherical radius (in meters) around each search step used to detect valid intersection props.
IntersectionSearchRadius=65
; The maximum heading difference (in degrees) allowed between the player and an intersection prop to consider it relevant.
IntersectionHeadingThreshold=40
; The absolute dot product threshold used to identify perpendicular cross-traffic vehicles approaching the intersection.
CrossTrafficHeadingDotThreshold=0.25
